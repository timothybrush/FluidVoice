name: Build and Test

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect build changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 2

    - name: Detect build-related changes
      id: filter
      uses: dorny/paths-filter@v3
      with:
        filters: |
          relevant:
            - 'Sources/**'
            - 'Tests/**'
            - 'Fluid.xcodeproj/**'
            - 'Package.swift'
            - 'Package.resolved'
            - 'Info.plist'
            - 'Fluid.entitlements'
            - '.swiftlint.yml'
            - '.github/workflows/build.yml'

  lint:
    name: SwiftLint
    if: needs.changes.outputs.relevant == 'true' && (github.event_name == 'push' || github.event.pull_request.draft == false)
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run SwiftLint (strict)
      run: |
        docker run --rm \
          --volume "$PWD:$PWD" \
          --workdir "$PWD" \
          ghcr.io/realm/swiftlint:0.63.2 \
          lint --strict --config .swiftlint.yml

  build:
    name: Build FluidVoice
    if: needs.changes.outputs.relevant == 'true' && needs.lint.result == 'success'
    needs: [changes, lint]
    runs-on: macos-latest
    timeout-minutes: 20
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install xcpretty
      run: sudo gem install xcpretty

    - name: Cache Whisper models
      uses: actions/cache@v4
      with:
        path: ~/Library/Caches/WhisperModels
        key: ${{ runner.os }}-whisper-models-transcribecpp-v1

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    
    - name: Show Xcode version
      run: xcodebuild -version
      
    # Tiny Whisper GGUF output is nondeterministic on hosted macOS runners.
    # Keep this E2E assertion in the suite for local validation, but skip it in CI.
    - name: Build and test (excluding flaky Tiny Whisper E2E)
      run: |
        set -o pipefail
        xcodebuild test \
          -project Fluid.xcodeproj \
          -scheme Fluid \
          -destination 'platform=macOS,arch=arm64' \
          -skip-testing:FluidDictationIntegrationTests/DictationE2ETests/testDictationEndToEnd_whisperTiny_transcribesFixture \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          | xcpretty
